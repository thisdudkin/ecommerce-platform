openapi: 3.0.0

info:
  title: Profile Service API
  description: REST API is provided for end-user interaction with the Profile Service.
  version: 1.0.0

servers:
  - url: 'http://localhost:8090'
    description: Local

tags:
  - name: Profiles
    description: Customer profile management
  - name: Addresses
    description: Customer address management
  - name: Countries
    description: Country reference data

paths:
  /api/v1/profiles:
    post:
      tags:
        - Profiles
      summary: Create a profile
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: Profile created
          headers:
            Location:
              description: URI of the created profile
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'

  /api/v1/profiles/{profileId}:
    parameters:
      - $ref: '#/components/parameters/ProfileId'

    get:
      tags:
        - Profiles
      summary: Get a profile
      operationId: getProfile
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'

    put:
      tags:
        - Profiles
      summary: Update a profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'

    delete:
      tags:
        - Profiles
      summary: Delete a profile
      description: Deletes the profile together with all its addresses.
      operationId: deleteProfile
      responses:
        '204':
          description: Profile deleted

  /api/v1/profiles/{profileId}/addresses:
    parameters:
      - $ref: '#/components/parameters/ProfileId'

    get:
      tags:
        - Addresses
      summary: List profile addresses
      operationId: listProfileAddresses
      responses:
        '200':
          description: Profile addresses returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressListResponse'

    post:
      tags:
        - Addresses
      summary: Add an address to a profile
      operationId: createProfileAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '201':
          description: Address created
          headers:
            Location:
              description: URI of the created address
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'

  /api/v1/profiles/{profileId}/addresses/{addressId}:
    parameters:
      - $ref: '#/components/parameters/ProfileId'
      - $ref: '#/components/parameters/AddressId'

    get:
      tags:
        - Addresses
      summary: Get a profile address
      operationId: getProfileAddress
      responses:
        '200':
          description: Address found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'

    put:
      tags:
        - Addresses
      summary: Update a profile address
      operationId: updateProfileAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'

    delete:
      tags:
        - Addresses
      summary: Delete a profile address
      operationId: deleteProfileAddress
      responses:
        '204':
          description: Address deleted

  /api/v1/countries:
    get:
      tags:
        - Countries
      summary: List countries
      operationId: listCountries
      responses:
        '200':
          description: Countries returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryListResponse'

components:
  parameters:
    ProfileId:
      name: profileId
      in: path
      required: true
      description: Profile ID
      schema:
        type: string
        format: uuid
        example: 019f61c4-deae-7656-9fab-2980b3e2f19d

    AddressId:
      name: addressId
      in: path
      required: true
      description: Address ID
      schema:
        type: string
        format: uuid
        example: 019f61c5-abcd-7890-efgh-123456789abc

  schemas:
    CreateProfileRequest:
      type: object
      additionalProperties: false
      required:
        - user_id
        - name
        - surname
      properties:
        user_id:
          type: string
          format: uuid
          example: 019f61bd-cb8c-731c-9698-86719b2ed24b
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Jeff
        surname:
          type: string
          minLength: 1
          maxLength: 100
          example: Bezos
        birthdate:
          type: string
          format: date
          nullable: true
          example: "1964-01-12"
        phone:
          type: string
          maxLength: 32
          nullable: true
          example: "+12025550123"
        country_code:
          type: string
          pattern: '^[A-Z]{2}$'
          nullable: true
          description: ISO 3166-1 alpha-2 country code
          example: "US"

    UpdateProfileRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - surname
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Elon
        surname:
          type: string
          minLength: 1
          maxLength: 100
          example: Musk
        birthdate:
          type: string
          format: date
          nullable: true
          example: "1971-06-28"
        phone:
          type: string
          maxLength: 32
          nullable: true
          example: "+442071234567"
        country_code:
          type: string
          pattern: '^[A-Z]{2}$'
          nullable: true
          description: ISO 3166-1 alpha-2 country code
          example: "GB"

    ProfileResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - user_id
        - name
        - surname
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 019f61c4-deae-7656-9fab-2980b3e2f19d
        user_id:
          type: string
          format: uuid
          example: 019f61c4-ebfe-7aec-ae3d-68c9ba6dbb3f
        name:
          type: string
          maxLength: 100
          example: Megan
        surname:
          type: string
          maxLength: 100
          example: Fox
        birthdate:
          type: string
          format: date
          nullable: true
          example: "1986-05-16"
        phone:
          type: string
          maxLength: 32
          nullable: true
          example: "+33123456789"
        country:
          allOf:
            - $ref: '#/components/schemas/CountryResponse'
          nullable: true
        created_at:
          type: string
          format: date-time
          example: "2026-07-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-15T14:45:30Z"

    CreateAddressRequest:
      type: object
      additionalProperties: false
      required:
        - country_code
        - label
        - recipient
        - city
        - street
        - building
      properties:
        country_code:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code
          example: "US"
        label:
          type: string
          minLength: 1
          maxLength: 50
          example: Home
        recipient:
          type: string
          minLength: 1
          maxLength: 200
          example: Michael Jackson
        region:
          type: string
          maxLength: 100
          nullable: true
          example: Colorado
        city:
          type: string
          minLength: 1
          maxLength: 100
          example: Denver
        zipcode:
          type: string
          maxLength: 20
          nullable: true
          example: "80202"
        street:
          type: string
          minLength: 1
          maxLength: 150
          example: 1079 S Naples Way
        building:
          type: string
          minLength: 1
          maxLength: 30
          example: "1079"
        apartment:
          type: string
          maxLength: 30
          nullable: true
          example: "14"
        preferred:
          type: boolean
          default: false
          example: false

    UpdateAddressRequest:
      type: object
      additionalProperties: false
      required:
        - country_code
        - label
        - recipient
        - city
        - street
        - building
        - preferred
      properties:
        country_code:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code
          example: "FR"
        label:
          type: string
          minLength: 1
          maxLength: 50
          example: Work
        recipient:
          type: string
          minLength: 1
          maxLength: 200
          example: Shakira
        region:
          type: string
          maxLength: 100
          nullable: true
          example: Île-de-France
        city:
          type: string
          minLength: 1
          maxLength: 100
          example: Paris
        zipcode:
          type: string
          maxLength: 20
          nullable: true
          example: "75001"
        street:
          type: string
          minLength: 1
          maxLength: 150
          example: 43 Rue Berger
        building:
          type: string
          minLength: 1
          maxLength: 30
          example: "43"
        apartment:
          type: string
          maxLength: 30
          nullable: true
          example: "7"
        preferred:
          type: boolean
          example: true

    AddressResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - profile_id
        - country
        - label
        - recipient
        - city
        - street
        - building
        - preferred
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 019f61c5-abcd-7890-efgh-123456789abc
        profile_id:
          type: string
          format: uuid
          example: 019f61c4-deae-7656-9fab-2980b3e2f19d
        country:
          $ref: '#/components/schemas/CountryResponse'
        label:
          type: string
          maxLength: 50
          example: Home
        recipient:
          type: string
          maxLength: 200
          example: John Doe
        region:
          type: string
          maxLength: 100
          nullable: true
          example: California
        city:
          type: string
          maxLength: 100
          example: San Francisco
        zipcode:
          type: string
          maxLength: 20
          nullable: true
          example: "94102"
        street:
          type: string
          maxLength: 150
          example: 123 Market Street
        building:
          type: string
          maxLength: 30
          example: "123"
        apartment:
          type: string
          maxLength: 30
          nullable: true
          example: "5B"
        preferred:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-07-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-15T14:45:30Z"

    AddressListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddressResponse'
          example:
            - id: 019f61c5-abcd-7890-efgh-123456789abc
              profile_id: 019f61c4-deae-7656-9fab-2980b3e2f19d
              country:
                code: US
                name: United States
              label: Home
              recipient: John Doe
              region: California
              city: San Francisco
              zipcode: "94102"
              street: 123 Market Street
              building: "123"
              apartment: "5B"
              preferred: true
              created_at: "2026-07-15T10:30:00Z"
              updated_at: "2026-07-15T14:45:30Z"

    CountryResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - name
      properties:
        code:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code
          example: US
        name:
          type: string
          maxLength: 100
          example: United States

    CountryListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CountryResponse'
          example:
            - code: US
              name: United States
            - code: GB
              name: United Kingdom
            - code: FR
              name: France
