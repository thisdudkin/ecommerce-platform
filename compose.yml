services:
  nexus:
    image: sonatype/nexus3:3.94.0
    container_name: nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus_data:/nexus-data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8081/service/rest/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  profiles-postgres:
    image: postgres:18.0
    container_name: profiles-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: profiles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - profiles_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  nexus_data:
    driver: local
  profiles_pgdata:
    driver: local
