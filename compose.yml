services:
  profiles-postgres:
    image: postgres:18.0
    container_name: profiles-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: profiles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - profiles_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  profiles_pgdata:
    driver: local
